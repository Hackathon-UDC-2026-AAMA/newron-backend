services:
  ollama:
    image: ollama/ollama:latest
    container_name: newron_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: postgres:16
    container_name: newron_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newron"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newron_backend
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    command: sh /app/app/start.sh
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD}
      YOUTUBE_SIMILARITY_THRESHOLD: ${YOUTUBE_SIMILARITY_THRESHOLD}
      LINK_SIMILARITY_THRESHOLD: ${LINK_SIMILARITY_THRESHOLD}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      STT_MODEL: ${STT_MODEL}
      STT_DEVICE: ${STT_DEVICE}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE}
      LANGEXTRACT_ENABLED: ${LANGEXTRACT_ENABLED}
      LANGEXTRACT_MODEL_ID: ${LANGEXTRACT_MODEL_ID}
      LANGEXTRACT_MODEL_URL: ${LANGEXTRACT_MODEL_URL}
      CATEGORY_NAME_LLM_ENABLED: ${CATEGORY_NAME_LLM_ENABLED}
      CATEGORY_NAME_LLM_MODEL_ID: ${CATEGORY_NAME_LLM_MODEL_ID}
      CATEGORY_NAME_LLM_TIMEOUT: ${CATEGORY_NAME_LLM_TIMEOUT}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      SEMANTIC_FOCUS_MAX_CHARS: ${SEMANTIC_FOCUS_MAX_CHARS}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR}
      FILE_TITLE_WEIGHT: ${FILE_TITLE_WEIGHT}
      HOST_IP: ${HOST_IP}
      WARMUP_EMBEDDING_MODEL: ${WARMUP_EMBEDDING_MODEL}
      WARMUP_OLLAMA_MODELS: ${WARMUP_OLLAMA_MODELS}
      OLLAMA_PULL_TIMEOUT_SECONDS: ${OLLAMA_PULL_TIMEOUT_SECONDS}
    ports:
      - "8000:8000"

    develop:
      watch:
        - action: sync          
          path: ./app           
          target: /app/app      
          ignore:
            - __pycache__/
        
        - action: rebuild
          path: ./requirements.txt

volumes:
  ollama_data:
  postgres_data:
