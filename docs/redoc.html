s"], "summary": "Listar items", "description": "Lista todos los items indexados ordenados por ID ascendente.", "operationId": "get_items_items_get", "responses": {"200": {"description": "Successful Response", "content": {"application/json": {"schema": {"items": {"$ref": "#/components/schemas/ItemResponse"}, "type": "array", "title": "Response Get Items Items Get"}}}}}}}, "/clusters/{cluster_id}/items": {"get": {"tags": ["Clusters"], "summary": "Listar items de un cluster", "description": "Devuelve los items pertenecientes a un cluster específico.", "operationId": "get_cluster_items_clusters__cluster_id__items_get", "parameters": [{"name": "cluster_id", "in": "path", "required": true, "schema": {"type": "integer", "title": "Cluster Id"}}], "responses": {"200": {"description": "Successful Response", "content": {"application/json": {"schema": {"type": "array", "items": {"$ref": "#/components/schemas/ItemResponse"}, "title": "Response Get Cluster Items Clusters  Cluster Id  Items Get"}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/items/{item_id}/content": {"get": {"tags": ["Items"], "summary": "Obtener contenido para UI", "description": "Devuelve texto de presentación para chat/UI; en archivos devuelve preview y URL de descarga.", "operationId": "get_item_content_items__item_id__content_get", "parameters": [{"name": "item_id", "in": "path", "required": true, "schema": {"type": "integer", "title": "Item Id"}}], "responses": {"200": {"description": "Successful Response", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ItemContentResponse"}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/clusters": {"get": {"tags": ["Clusters"], "summary": "Listar clusters", "description": "Devuelve todos los clusters con centroides y metadata de categoría. ": "Resultado detallado por elemento."}}, "type": "object", "required": ["total", "processed", "succeeded", "failed", "results"], "title": "BulkIngestResponse"}, "ClusterResponse": {"properties": {"id": {"type": "integer", "title": "Id"}, "cluster_label": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "Cluster Label"}, "cluster_description": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "Cluster Description"}, "cluster_keywords": {"items": {"type": "string"}, "type": "array", "title": "Cluster Keywords"}, "size": {"type": "integer", "title": "Size"}, "centroid": {"items": {"type": "number"}, "type": "array", "title": "Centroid"}, "created_at": {"type": "string", "format": "date-time", "title": "Created At"}}, "type": "object", "required": ["id", "cluster_label", "size", "centroid", "created_at"], "title": "ClusterResponse"}, "HTTPValidationError": {"properties": {"detail": {"items": {"$ref": "#/components/schemas/ValidationError"}, "type": "array", "title": "Detail"}}, "type": "object", "title": "HTTPValidationError"}, "HealthResponse": {"properties": {"status": {"type": "string", "title": "Status"}}, "type": "object", "required": ["status"], "title": "HealthResponse"}, "IngestRequest": {"properties": {"input": {"anyOf": [{"type": "string"}, {"items": {"type": "string"}, "type": "array"}], "title": "Input", "description": "Texto único o lista de textos/URLs para ingesta.", "examples": ["Nota técnica sobre embeddings y clustering", ["https://example.com", "Resumen de reunión de producto"]]}}, "type": "object", "required": ["input"], "title": "IngestRequest"}, "IngestResponse": {"properties": {"id": {"type": "integer", "title": "Id", "description": "ID del item guardado."}, "type": {"type": "string", "title": "Type", "description": "Tipo detectado: text, link, youtube, audio o file."}, "cluster_id": {"type": "integer", "title": "Cluster Id", "description": "Cluster asignado al item."}, "similarity_score": {"anyOf": [{"type": "number"}, {"type" d"}, "old_cluster_deleted": {"type": "boolean", "title": "Old Cluster Deleted"}, "old_cluster_size": {"anyOf": [{"type": "integer"}, {"type": "null"}], "title": "Old Cluster Size"}, "new_cluster_size": {"type": "integer", "title": "New Cluster Size"}}, "type": "object", "required": ["item_id", "old_cluster_id", "new_cluster_id", "old_cluster_deleted", "old_cluster_size", "new_cluster_size"], "title": "MoveItemClusterResponse"}, "PurgeResponse": {"properties": {"deleted_items": {"type": "integer", "title": "Deleted Items"}, "deleted_clusters": {"type": "integer", "title": "Deleted Clusters"}}, "type": "object", "required": ["deleted_items", "deleted_clusters"], "title": "PurgeResponse"}, "ValidationError": {"properties": {"loc": {"items": {"anyOf": [{"type": "string"}, {"type": "integer"}]}, "type": "array", "title": "Location"}, "msg": {"type": "string", "title": "Message"}, "type": {"type": "string", "title": "Error Type"}}, "type": "object", "required": ["loc", "msg", "type"], "title": "ValidationError"}}}, "tags": [{"name": "Auth", "description": "Pairing QR y sesión móvil."}, {"name": "Ingest", "description": "Entrada de contenido (texto, lista, audio y archivos)."}, {"name": "Items", "description": "Consulta y recuperación de items indexados."}, {"name": "Clusters", "description": "Consulta de clusters y agrupaciones."}, {"name": "Admin", "description": "Operaciones administrativas de mantenimiento."}, {"name": "Health", "description": "Estado operativo del servicio."}]};
